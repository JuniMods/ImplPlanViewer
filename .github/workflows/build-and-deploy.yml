name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'plan-viewer/**'
      - 'scripts/**'
      - '.github/workflows/build-and-deploy.yml'
  repository_dispatch:
    types: [plans_updated, manual_rebuild]
  workflow_dispatch:
    inputs:
      force_full_rebuild:
        description: Force rebuild all repositories
        type: boolean
        default: false
      specific_repo:
        description: Only rebuild specific repository (owner/name)
        type: string
        required: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  discover-repositories:
    name: Discover Repositories
    runs-on: ubuntu-latest
    outputs:
      repositories: ${{ steps.discover.outputs.repositories }}
      count: ${{ steps.discover.outputs.count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Discover repositories
        id: discover
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          GITHUB_ORG: ${{ vars.GITHUB_ORG || github.repository_owner }}
          GITHUB_TOPIC: ${{ vars.GITHUB_TOPIC || 'impl-plan-viewer' }}
          DISCOVERY_MODE: ${{ vars.DISCOVERY_MODE || 'topic' }}
          INCLUDE_REPOS: ${{ github.event.inputs.specific_repo }}
        run: |
          node scripts/discover-repositories.js > discovery.json
          node -e "const fs=require('node:fs');const d=JSON.parse(fs.readFileSync('discovery.json','utf8'));const out=process.env.GITHUB_OUTPUT;fs.appendFileSync(out,'count='+d.count+'\\nrepositories='+JSON.stringify(d.repositories)+'\\n');"

      - name: Upload discovery artifact
        uses: actions/upload-artifact@v4
        with:
          name: discovery
          path: discovery.json

  fetch-and-parse:
    name: Fetch & Parse Plans
    needs: discover-repositories
    if: needs.discover-repositories.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        repository: ${{ fromJson(needs.discover-repositories.outputs.repositories) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch plan files
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ toJson(matrix.repository) }}
        run: node scripts/fetch-plans.js > fetched.json

      - name: Parse plan files
        run: node scripts/parse-plans.js < fetched.json > parsed.json

      - name: Upload parsed result
        uses: actions/upload-artifact@v4
        with:
          name: parsed-${{ matrix.repository.id }}
          path: parsed.json

  build-app:
    name: Build Vue Application
    needs: [discover-repositories, fetch-and-parse]
    if: always() && needs.discover-repositories.result == 'success' && (needs.fetch-and-parse.result == 'success' || needs.fetch-and-parse.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download discovery artifact
        uses: actions/download-artifact@v4
        with:
          name: discovery
          path: .artifacts/discovery

      - name: Download parsed artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: parsed-*
          merge-multiple: true
          path: .artifacts/parsed

      - name: Build manifest input
        run: |
          node -e "const fs=require('node:fs');const path=require('node:path');const discovery=JSON.parse(fs.readFileSync('.artifacts/discovery/discovery.json','utf8'));const parsedDir='.artifacts/parsed';const parsed=[];if(fs.existsSync(parsedDir)){for(const file of fs.readdirSync(parsedDir)){if(file.endsWith('.json')){parsed.push(JSON.parse(fs.readFileSync(path.join(parsedDir,file),'utf8')));}}}fs.writeFileSync('manifest-input.json',JSON.stringify({repositories:discovery.repositories,parsedResults:parsed}));"

      - name: Generate manifests
        run: node scripts/generate-manifests.js < manifest-input.json

      - name: Validate manifests
        run: node scripts/validate-manifests.js plan-viewer/src/data

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: plan-viewer/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: plan-viewer

      - name: Build site
        run: npm run build
        working-directory: plan-viewer

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: plan-viewer/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build-app
    if: always() && needs.build-app.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
