name: Manual Rebuild

on:
  workflow_dispatch:
    inputs:
      force_full_rebuild:
        description: Force rebuild all discovered repositories
        type: boolean
        default: false
      specific_repo:
        description: Optional specific repository (owner/name)
        type: string
        required: false

permissions:
  actions: write
  contents: read

jobs:
  validate-inputs:
    runs-on: ubuntu-latest
    steps:
      - name: Validate repository input format
        if: ${{ github.event.inputs.specific_repo != '' }}
        run: |
          echo "${{ github.event.inputs.specific_repo }}" | grep -Eq '^[^/]+/[^/]+$' || {
            echo "specific_repo must match owner/name"
            exit 1
          }

  trigger-build-and-deploy:
    needs: validate-inputs
    runs-on: ubuntu-latest
    steps:
      - name: Trigger build-and-deploy workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-and-deploy.yml',
              ref: context.ref.replace('refs/heads/', ''),
              inputs: {
                force_full_rebuild: '${{ github.event.inputs.force_full_rebuild }}',
                specific_repo: '${{ github.event.inputs.specific_repo }}',
              },
            })
